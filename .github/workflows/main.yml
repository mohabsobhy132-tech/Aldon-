name: Build-Legendary-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Official Android App
        run: |
          echo "Preparing folders..."
          mkdir -p www
          # نقل الملفات لمجلد الويب
          cp -r ./* www/ || true
          
          echo "Installing Capacitor..."
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          echo "Configuring App..."
          # إنشاء ملف الإعدادات برمجياً لضمان عدم وجود أخطاء
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.mohab.aldon",
            "appName": "ALDON-PRO",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": { "androidScheme": "https" }
          }
          EOF

          npx cap add android
          
          echo "Building the APK..."
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALDON-PRO-FINAL-APK
          path: android/app/build/outputs/apk/debug/*.apk
