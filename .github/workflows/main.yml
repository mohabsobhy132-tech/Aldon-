name: Build-Legendary-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Official APK
        run: |
          npm install -g cordova
          # إنشاء المشروع بدون أسئلة تفاعلية
          cordova create aldon-app com.mohab.aldon "ALDON-PRO"
          
          # نقل ملفاتك الـ HTML جوه المشروع
          rm -rf aldon-app/www/*
          cp -r ./* aldon-app/www/ || true
          
          cd aldon-app
          cordova platform add android
          
          # أمر البناء النهائي
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALDON-PRO-FINAL
          path: aldon-app/platforms/android/app/build/outputs/apk/debug/*.apk
