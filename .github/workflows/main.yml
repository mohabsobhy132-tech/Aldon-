name: Build-ALdon-Legendary-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (High Performance)
        run: |
          npm install -g cordova
          # إنشاء التطبيق باسم ALdon
          cordova create aldon-app com.mohab.aldon "ALdon"
          
          # نقل الكود الجديد بتاعك لمجلد التطبيق
          rm -rf aldon-app/www/*
          cp -r ./* aldon-app/www/ || true
          
          cd aldon-app
          cordova platform add android
          
          # إضافة بلوجنات "الاحترافية"
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-navigationbar-color
          
          # تعديل الإعدادات (ملء الشاشة + إلغاء شاشة البداية + السرعة)
          sed -i '/<\/widget>/i <preference name="Fullscreen" value="true" />' config.xml
          sed -i '/<\/widget>/i <preference name="StatusBarOverlaysWebView" value="true" />' config.xml
          sed -i '/<\/widget>/i <preference name="SplashScreenDelay" value="0" />' config.xml
          sed -i '/<\/widget>/i <preference name="ShowSplashScreen" value="false" />' config.xml
          sed -i '/<\/widget>/i <preference name="Orientation" value="default" />' config.xml
          sed -i '/<\/widget>/i <icon src="../icon.png" />' config.xml
          
          # أمر البناء
          cordova build android --debug

      - name: Upload ALdon APK
        uses: actions/upload-artifact@v4
        with:
          name: ALdon-Official-APK
          path: aldon-app/platforms/android/app/build/outputs/apk/debug/*.apk
