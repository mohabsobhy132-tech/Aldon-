name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Web to APK
        uses: simple-apps/web-to-apk-action@v1
        with:
          app-name: "ALDON"
          app-bundle-id: "com.mohab.aldon"
          web-dir: "."
