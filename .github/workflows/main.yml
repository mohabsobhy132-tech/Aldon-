name: Build-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App
        uses: GearSnail/web-to-apk-action@v1
        with:
          title: "ALDON-PRO"
          url: "https://mohabsobhy132-tech.github.io/Aldon-/" # حط رابط موقعك هنا
          icon: "./icon.png" # لو عندك صورة سميها icon.png وارفعها

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALDON-PRO-INSTALLER
          path: ./*.apk
