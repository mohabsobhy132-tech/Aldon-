name: Build-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Web to APK
        uses: jrod95/web-to-apk-action@v1.1
        with:
          app-name: "ALDON-PRO"
          app-bundle-id: "com.mohab.aldon"
          web-dir: "."
