name: Build-Legendary-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21' # هنا تم التحديث للإصدار 21
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Official Android App
        run: |
          echo "Preparing files..."
          mkdir -p www
          rsync -av --exclude='www' --exclude='.github' --exclude='.git' ./ www/
          
          echo "Installing Official Tools..."
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          echo "Initializing Android Project..."
          npx cap init "ALDON-PRO" "com.mohab.aldon" --web-dir www
          npx cap add android
          
          echo "Building the final APK..."
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Legendary APK
        uses: actions/upload-artifact@v4
        with:
          name: ALDON-PRO-APK
          path: android/app/build/outputs/apk/debug/*.apk
