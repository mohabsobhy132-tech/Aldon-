name: Build-Final-Legendary-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK using Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # إنشاء مجلد البناء
          mkdir build-dir && cd build-dir
          
          # الأوامر دي بتبني التطبيق بإعداداتك الخاصة
          # لاحظ خيار "fullscreen" عشان يخفي شريط الحالة
          bubblewrap init --url "https://mohabsobhy132-tech.github.io/Aldon-/"
          bubblewrap build --skipSigning
          
          # نقل ملف الـ APK للمجلد الرئيسي
          cp ./app-release-unsigned.apk ../ALDON-PRO.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALDON-PRO-LEGEND-APK
          path: ALDON-PRO.apk
