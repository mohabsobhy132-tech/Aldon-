<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCAR OMNI V16 - CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #e50914; --bg: #080808; --card: #141414; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px 5%; z-index: 1000; border-bottom: 2px solid var(--main); display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--main); }
        input#search { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; outline: none; }

        .section-title { padding: 20px 5% 0; font-size: 20px; font-weight: bold; color: var(--main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 5%; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--main); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card h4 { font-size: 13px; padding: 10px; text-align: center; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #playerScreen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .p-nav { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        
        /* حاوية المشغل مع دعم الزوم */
        .ifr-box { 
            width: 100%; aspect-ratio: 16/9; max-width: 1000px; margin: auto; 
            background: #000; position: relative; border: 1px solid #222; 
            overflow: hidden; 
        }
        iframe { width: 100%; height: 100%; border: none; transition: 0.3s; transform-origin: center; }

        /* لوحة التحكم الخارجية (الحل الجذري) */
        .remote-control { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            padding: 15px; max-width: 1000px; margin: auto; background: #0a0a0a;
        }
        .ctrl-btn { 
            background: #222; border: 1px solid #444; color: #fff; padding: 12px; 
            border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .ctrl-btn:active { background: var(--main); }

        .srv-box { display: flex; gap: 10px; padding: 15px; overflow-x: auto; justify-content: center; background: #0a0a0a; }
        .srv-btn { padding: 10px 20px; background: #222; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; transition: 0.3s; }
        .srv-btn.active { background: var(--main); font-weight: bold; }

        .ep-box { padding: 20px 5%; max-width: 1000px; margin: auto; }
        .ep-item { display: flex; gap: 15px; background: #111; margin-bottom: 10px; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .ep-item:hover { background: #1a1a1a; }
        .ep-item img { width: 120px; aspect-ratio: 16/9; object-fit: cover; }
        .ep-info { padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .ep-info h5 { margin: 0; font-size: 14px; color: var(--main); }

        .close-btn { background: var(--main); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">OSCAR OMNI</div>
        <input type="text" id="search" placeholder="ابحث عن أي فيلم أو مسلسل..." onkeyup="if(event.keyCode==13) search()">
    </header>

    <div id="mainUI">
        <div class="section-title">🔥 الأكثر شهرة اليوم</div>
        <div class="grid" id="trendingGrid"></div>
    </div>

    <div id="playerScreen">
        <div class="p-nav">
            <div id="p-title" style="font-weight: bold;">اسم العمل</div>
            <div class="close-btn" onclick="cls()">إغلاق ✖</div>
        </div>

        <div class="ifr-box">
            <iframe id="mainIfr" allowfullscreen allow="autoplay"></iframe>
        </div>

        <div class="remote-control">
            <div class="ctrl-btn" onclick="seek(-10)">⏪ -10 ث</div>
            <div class="ctrl-btn" onclick="seek(10)">تقديم +10 ⏩</div>
            <div class="ctrl-btn" onclick="zoom(0.1)">🔍 زوم +</div>
            <div class="ctrl-btn" onclick="zoom(-0.1)">🔍 زوم -</div>
        </div>

        <div class="srv-box" id="srvList"></div>

        <div class="ep-box" id="epArea">
            <h3 style="color: var(--main);">قائمة الحلقات</h3>
            <div id="epList"></div>
        </div>
    </div>

    <script>
        const API_KEY = '0f0166ba0d2bd839ed731cda436af91c';
        let currentZoom = 1;

        window.onload = loadTrending;

        async function loadTrending() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}&language=ar`);
            const data = await res.json();
            displayGrid(data.results);
        }

        async function search() {
            const q = document.getElementById('search').value;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=ar`);
            const data = await res.json();
            displayGrid(data.results);
        }

        function displayGrid(items) {
            const grid = document.getElementById('trendingGrid');
            grid.innerHTML = items.map(item => `
                <div class="card" onclick="openMedia('${item.id}', '${item.media_type || 'movie'}')">
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" onerror="this.src='https://via.placeholder.com/160x240/111/fff?text=No+Image'">
                    <h4>${item.title || item.name}</h4>
                </div>
            `).join('');
        }

        async function openMedia(id, type) {
            document.getElementById('playerScreen').style.display = 'flex';
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=ar`);
            const data = await res.json();
            document.getElementById('p-title').innerText = data.title || data.name;

            const servers = [
                { name: "سيرفر الأسطورة 2 (الأساسي)", url: `https://vidsrc.me/embed/${type}/${id}` },
                { name: "سيرفر الأسطورة 1", url: `https://vidsrc.pro/embed/${type}/${id}` },
                { name: "سيرفر الأسطورة 3", url: `https://embed.su/embed/${type}/${id}` }
            ];
            renderServers(servers);

            if (type === 'tv') {
                document.getElementById('epArea').style.display = 'block';
                loadEpisodes(id, 1);
            } else {
                document.getElementById('epArea').style.display = 'none';
            }
        }

        async function loadEpisodes(id, season) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API_KEY}&language=ar`);
            const data = await res.json();
            document.getElementById('epList').innerHTML = data.episodes.map(ep => `
                <div class="ep-item" onclick="playEp('${id}', ${season}, ${ep.episode_number})">
                    <img src="https://image.tmdb.org/t/p/w300${ep.still_path}" onerror="this.src='https://via.placeholder.com/120x67/222/fff?text=EP'">
                    <div class="ep-info">
                        <h5>الحلقة ${ep.episode_number}: ${ep.name}</h5>
                    </div>
                </div>
            `).join('');
        }

        function playEp(id, s, e) {
            const servers = [
                { name: "سيرفر الأسطورة 2 (الأساسي)", url: `https://vidsrc.me/embed/tv/${id}/${s}/${e}` },
                { name: "سيرفر الأسطورة 1", url: `https://vidsrc.pro/embed/tv/${id}/${s}/${e}` },
                { name: "سيرفر الأسطورة 3", url: `https://embed.su/embed/tv/${id}/${s}/${e}` }
            ];
            renderServers(servers);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderServers(servers) {
            const container = document.getElementById('srvList');
            container.innerHTML = servers.map((s, i) => `
                <div class="srv-btn ${i===0?'active':''}" onclick="runSrv('${s.url}', this)">${s.name}</div>
            `).join('');
            runSrv(servers[0].url);
        }

        function runSrv(url, btn) {
            if(btn) {
                document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const ifr = document.getElementById('mainIfr');
            ifr.src = url;
            currentZoom = 1;
            ifr.style.transform = `scale(1)`;
        }

        // --- وظائف التحكم الخارجية (التقديم والزوم) ---
        function seek(amount) {
            const ifr = document.getElementById('mainIfr');
            ifr.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'seekTo',
                args: [amount, true]
            }), '*');
        }

        function zoom(amount) {
            currentZoom += amount;
            document.getElementById('mainIfr').style.transform = `scale(${currentZoom})`;
        }

        function cls() {
            document.getElementById('playerScreen').style.display = 'none';
            document.getElementById('mainIfr').src = '';
        }
    </script>
</body>
</html>
